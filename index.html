<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>MIX DROP</title>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">MIXDROP</a>
    </div>
    
    <div class="container">
        <div class="left-column">
            <h1>Informações do Artista</h1>
            <form id="formArtista">
                <label for="nomeArtista">Nome do Artista:</label>
                <input type="text" id="nomeArtista" required>
                <button type="submit">Buscar</button>
            </form>
            <p>Nome: <span id="artistaNome"></span></p>
            <p>Popularidade: <span id="artistaPopularidade"></span></p>
            <p>Seguidores: <span id="artistaSeguidores"></span></p>
            <img id="artistaImagem" src="" alt="Imagem do Artista" style="display: none;">
        </div>

        <div class="right-column">
            <div>
                <h2>Músicas Mais Conhecidas</h2>
                <ul id="listaMusicas"></ul>
            </div>
            <div>
                <h2>Favoritos</h2>
                <ul id="listaFavoritos"></ul>
            </div>
            <div>
             
                <iframe id="player" height="380" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
